<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giochi Popolari - Siw Videogiochi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- React & ReactDOM (UMD via CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (per compilare JSX nel browser) -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">🎮 SiwVideogiochi</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/rawg/popolari" style="color: var(--primary);">Giochi Popolari (RAWG)</a>
            <a href="/videogiochi">Libreria Personale</a>
        </div>
    </nav>

    <div class="container">
        <!-- ROOT REACT -->
        <div id="react-search-root"></div>
    </div>

    <!-- Componente React Integrato -->
    <script type="text/babel" th:inline="none">
        const { useState, useEffect } = React;

        function SearchApp() {
            const [query, setQuery] = useState("");
            const [games, setGames] = useState([]);
            const [loading, setLoading] = useState(false);
            const [isSearch, setIsSearch] = useState(false);

            // Carica i giochi popolari all'avvio
            useEffect(() => {
                fetchPopularGames();
            }, []);

            const fetchPopularGames = async () => {
                setLoading(true);
                try {
                    const response = await fetch("/api/rawg/popolari");
                    const data = await response.json();
                    setGames(data);
                    setIsSearch(false);
                } catch (error) {
                    console.error("Errore fetching popular games", error);
                } finally {
                    setLoading(false);
                }
            };

            const searchGames = async (searchQuery) => {
                if (!searchQuery.trim()) {
                    fetchPopularGames();
                    return;
                }
                setLoading(true);
                setIsSearch(true);
                try {
                    const response = await fetch("/api/rawg/ricerca?query=" + encodeURIComponent(searchQuery));
                    const data = await response.json();
                    setGames(data);
                } catch (error) {
                    console.error("Errore fetching search results", error);
                } finally {
                    setLoading(false);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                searchGames(query);
            };

            return (
                <React.Fragment>
                    <div className="page-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: '1rem' }}>
                        <div>
                            <h1 className="page-title">
                                {isSearch && query.trim() ? "Risultati per: " + query : "I Più Popolari del Momento"}
                            </h1>
                            <p style={{ color: 'var(--text-muted)' }}>
                                {isSearch && query.trim() ? "Risultati della ricerca in tempo reale da RAWG API." : "Esplora i giochi di tendenza recuperati in tempo reale tramite le API di RAWG."}
                            </p>
                        </div>
                        
                        <form onSubmit={handleSubmit} style={{ display: 'flex', gap: '0.5rem', maxWidth: '100%' }}>
                            <input 
                                type="text" 
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                placeholder="Cerca un gioco (es. Mario)..." 
                                style={{ padding: '0.8rem 1rem', borderRadius: '8px', border: '1px solid rgba(255,255,255,0.2)', background: 'rgba(0,0,0,0.2)', color: 'white', outline: 'none', flexGrow: 1 }}
                            />
                            <button type="submit" className="btn btn-primary" style={{ padding: '0.8rem 1.5rem' }}>
                                Cerca
                            </button>
                        </form>
                    </div>

                    {loading ? (
                        <div style={{ textAlign: 'center', marginTop: '3rem', color: 'var(--text-muted)' }}>
                            <h2>Caricamento in corso...</h2>
                        </div>
                    ) : (
                        <div className="games-grid">
                            {games.map(gioco => (
                                <a key={gioco.id} href={"/rawg/gioco/" + gioco.id} className="game-card">
                                    <div className="card-img-container">
                                        <img 
                                            src={gioco.background_image || 'https://via.placeholder.com/600x400?text=No+Image'} 
                                            alt="Cover del gioco" 
                                            className="card-img"
                                        />
                                    </div>
                                    <div className="card-content">
                                        <h3 className="card-title">{gioco.name}</h3>
                                        <div className="card-meta">
                                            <span>{gioco.released || 'Data sconosciuta'}</span>
                                            <span className="rating-badge">
                                                ★ <span>{gioco.rating || 'N/A'}</span>
                                            </span>
                                        </div>
                                    </div>
                                </a>
                            ))}
                        </div>
                    )}

                    {!loading && games.length === 0 && (
                        <div style={{ textAlign: 'center', marginTop: '3rem', color: 'var(--text-muted)' }}>
                            <h2>Nessun gioco trovato.</h2>
                        </div>
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-search-root'));
        root.render(<SearchApp />);
    </script>
</body>
</html>
