<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giochi Popolari - Siw Videogiochi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">🎮 SiwVideogiochi</a>
        <div style="display: flex; align-items: center; gap: 2rem; flex: 1; justify-content: flex-end;">
            <!-- Contenitore per l'app React (Solo Search Bar / Autocomplete) -->
            <div id="react-search-bar" style="width: 100%; max-width: 350px; position: relative;"></div>

            <div class="nav-links">
                <a th:href="@{/libreria}">Libreria Personale</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">I Più Popolari del Momento</h1>
            <p style="color: var(--text-muted);">Esplora i giochi di tendenza recuperati in tempo reale tramite le API
                di RAWG.</p>
        </div>



        <!-- Griglia principale (Renderizzata lato server con Thymeleaf) -->
        <div class="games-grid" th:if="${giochi != null && !giochi.isEmpty()}">
            <a th:each="gioco : ${giochi}" th:href="@{/rawg/gioco/{id}(id=${gioco.id})}" class="game-card">
                <div class="card-img-container">
                    <img th:src="${gioco.background_image != null ? gioco.background_image : 'https://via.placeholder.com/600x400?text=No+Image'}" 
                         alt="Cover del gioco" 
                         class="card-img" />
                </div>
                <div class="card-content">
                    <h3 class="card-title" th:text="${gioco.name}">Nome Gioco</h3>
                    <div class="card-meta">
                        <span th:text="${gioco.released != null ? gioco.released : 'Data sconosciuta'}">Data Rilascio</span>
                    </div>
                </div>
            </a>
        </div>
        
        <div th:if="${giochi == null || giochi.isEmpty()}" style="text-align: center; margin-top: 3rem; color: var(--text-muted);">
            <h2>Nessun gioco popolare trovato al momento.</h2>
        </div>

    <!-- Caricamento librerie React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
    /*<![CDATA[*/
        const { useState, useEffect } = React;

        function SearchBar() {
            const [search, setSearch] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [showDropdown, setShowDropdown] = useState(false);

            useEffect(() => {
                if (!search.trim()) {
                    setResults([]);
                    setShowDropdown(false);
                    return;
                }

                const delayDebounceFn = setTimeout(() => {
                    fetchResults();
                }, 500);

                return () => clearTimeout(delayDebounceFn);
            }, [search]);

            const fetchResults = () => {
                setLoading(true);
                fetch(`/api/rawg/ricerca?query=${encodeURIComponent(search.trim())}`)
                    .then(res => res.json())
                    .then(data => {
                        setResults(data || []);
                        setLoading(false);
                        setShowDropdown(true);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            };

            return (
                <div style={{ position: 'relative', width: '100%', margin: '0 auto' }}>
                    <input 
                        type="text" 
                        placeholder="Cerca un gioco..." 
                        value={search}
                        onChange={(e) => setSearch(e.target.value)}
                        onFocus={() => { if (results.length > 0) setShowDropdown(true); }}
                        onBlur={() => setTimeout(() => setShowDropdown(false), 200)}
                        style={{ width: '100%', padding: '0.6rem 1rem', borderRadius: '8px', border: '1px solid rgba(255, 255, 255, 0.2)', fontSize: '0.95rem', boxSizing: 'border-box', backgroundColor: 'rgba(30, 41, 59, 0.9)', color: '#f8fafc' }}
                    />
                    
                    {loading && (
                        <div style={{ position: 'absolute', right: '15px', top: '10px', color: '#cbd5e1', fontSize: '0.9rem' }}>
                            ...
                        </div>
                    )}

                    {showDropdown && results.length > 0 && (
                        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, backgroundColor: 'rgba(30, 41, 59, 0.95)', borderRadius: '8px', border: '1px solid rgba(255, 255, 255, 0.1)', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.5)', zIndex: 1000, maxHeight: '400px', overflowY: 'auto', marginTop: '4px', backdropFilter: 'blur(8px)' }}>
                            {results.map(gioco => (
                                <a key={gioco.id} href={`/rawg/gioco/${gioco.id}`} style={{ display: 'flex', alignItems: 'center', padding: '10px', textDecoration: 'none', color: '#f8fafc', borderBottom: '1px solid rgba(255, 255, 255, 0.05)', transition: 'background-color 0.2s' }} onMouseOver={(e) => e.currentTarget.style.backgroundColor = 'rgba(255, 255, 255, 0.1)'} onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'transparent'}>
                                    <img src={gioco.background_image || 'https://via.placeholder.com/40x40'} style={{ width: '40px', height: '40px', objectFit: 'cover', borderRadius: '4px', marginRight: '12px' }} />
                                    <div>
                                        <div style={{ fontWeight: '600', fontSize: '0.95rem', marginBottom: '2px' }}>{gioco.name}</div>
                                        <div style={{ fontSize: '0.8rem', color: '#cbd5e1' }}>{gioco.released || 'N/A'}</div>
                                    </div>
                                </a>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-search-bar'));
        root.render(<SearchBar />);
    /*]]>*/
    </script>
    </div>

</body>

</html>
