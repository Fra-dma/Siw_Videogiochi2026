<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${videogioco != null ? videogioco.titolo + ' - Siw Videogiochi' : 'Dettaglio Gioco'}">Dettaglio Gioco</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container" style="max-width: 1000px; padding: 2rem;">

        <div th:if="${videogioco == null}" style="text-align: center; margin-top: 3rem; color: var(--text-muted);">
            <h2>Gioco non trovato nella libreria.</h2>
            <a href="/videogiochi" class="btn btn-primary" style="margin-top: 1rem;">Torna alla Libreria</a>
        </div>

        <div th:if="${videogioco != null}" class="game-details"
            style="display: grid; grid-template-columns: 1fr 2fr; gap: 3rem;">

            <!-- Colonna Sinistra: Immagine e Bottone Rimuovi -->
            <div class="game-details-img" style="display: flex; flex-direction: column; gap: 1rem;">
                <img th:src="${videogioco.urlCopertina != null ? videogioco.urlCopertina : 'https://via.placeholder.com/600x400?text=Nessuna+Copertina'}"
                    alt="Cover" style="width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                
                <!-- Form per rimuovere il gioco dalla libreria -->
                <form th:action="@{/libreria/rimuovi}" method="post" style="margin: 0; display: flex;">
                    <input type="hidden" name="videogiocoId" th:value="${videogioco.id}" />
                    <input type="hidden" name="idUtente" value="1" />
                    <button type="submit" class="btn" style="flex: 1; text-align: center; background: rgba(239, 68, 68, 0.8); border: 1px solid rgba(239, 68, 68, 0.4); color: white; cursor: pointer; border-radius: 8px; padding: 0.75rem 1.5rem; font-weight: 600; transition: all 0.2s ease;">
                        Rimuovi dalla libreria
                    </button>
                </form>
            </div>

            <!-- Colonna Destra: Dettagli -->
            <div class="game-details-content">
                <h1 th:text="${videogioco.titolo}"
                    style="font-size: 3rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #fff, #a0a0a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    Titolo Gioco</h1>

                <div style="display: flex; gap: 1rem; margin-bottom: 2rem; color: var(--text-muted); font-size: 1.1rem; align-items: center;">
                    <span th:text="${videogioco.annoUscita != null ? videogioco.annoUscita : 'Anno sconosciuto'}">2023</span>
                    <span>&bull;</span>
                    <span th:if="${videogioco.sviluppatore != null}" th:text="${videogioco.sviluppatore.nome}">Sviluppatore</span>
                    <span th:if="${videogioco.sviluppatore == null}">Sviluppatore sconosciuto</span>
                </div>

                <div class="tags" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem;">
                    <!-- Generi -->
                    <span th:each="genere : ${videogioco.generi}" class="tag"
                        style="background: rgba(142, 45, 226, 0.2); color: #c471ed; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.9rem;"
                        th:text="${genere.nome}">Genere</span>
                </div>

                <div class="tags" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem;">
                    <!-- Piattaforme -->
                    <span th:each="piattaforma : ${videogioco.piattaforme}" class="tag"
                        style="background: rgba(255, 255, 255, 0.1); color: #fff; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2);"
                        th:text="${piattaforma.nome}">Piattaforma</span>
                </div>

                <div style="margin-bottom: 2rem; line-height: 1.6; color: rgba(255,255,255,0.8);">
                    <h3>Descrizione</h3>
                    <p th:text="${videogioco.descrizione != null ? videogioco.descrizione : 'Nessuna descrizione disponibile.'}"
                        style="margin-top: 0.5rem;">Descrizione del gioco...</p>
                </div>

                <!-- SEZIONE RECENSIONE (Mostrata solo se il gioco è nella libreria) -->
                <div th:if="${recensione != null}" style="margin-top: 3rem; background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                    <h3 style="margin-bottom: 1rem; color: #fff;">La tua recensione</h3>
                    
                    <!-- VISUALIZZAZIONE DELLA RECENSIONE (Se esiste già un voto) -->
                    <div th:if="${recensione.voto != null}" id="recensione-testo">
                        <div style="margin-bottom: 1.5rem;">
                            <span style="font-size: 1.5rem; font-weight: bold; color: #c471ed;" th:text="${recensione.voto} + '/10'"></span>
                            <p style="margin-top: 0.5rem; color: rgba(255,255,255,0.8); line-height: 1.5; font-style: italic;" th:text="${recensione.commento}"></p>
                        </div>
                        
                        <div style="display: flex; gap: 1rem;">
                            <!-- Bottone Modifica: nasconde il testo e mostra il form -->
                            <button type="button" onclick="document.getElementById('form-recensione').style.display = 'flex'; document.getElementById('recensione-testo').style.display = 'none';" 
                                style="background: transparent; color: #a0a0a0; border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.2s;">
                                Modifica
                            </button>

                            <!-- Form per eliminare (rimette voto e commento a null) -->
                            <form th:action="@{/libreria/recensione/rimuovi}" method="post" style="margin: 0;">
                                <input type="hidden" name="videogiocoId" th:value="${videogioco.id}" />
                                <button type="submit" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.2s;">
                                    Elimina
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- FORM DI INSERIMENTO O MODIFICA -->
                    <!-- Se il voto esiste, parte nascosto. Se non esiste, parte visibile -->
                    <form id="form-recensione" th:action="@{/libreria/recensisci}" method="post" 
                          th:style="${recensione.voto != null} ? 'display: none; flex-direction: column; gap: 1rem;' : 'display: flex; flex-direction: column; gap: 1rem;'">
                        
                        <input type="hidden" name="videogiocoId" th:value="${videogioco.id}" />

                        <div>
                            <label for="voto" style="display: block; margin-bottom: 0.5rem; color: #a0a0a0;">Voto (1-10):</label>
                            <input type="number" id="voto" name="voto" min="1" max="10" required 
                                   th:value="${recensione.voto}"
                                   style="width: 100px; padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 1rem;" />
                        </div>

                        <div>
                            <label for="commento" style="display: block; margin-bottom: 0.5rem; color: #a0a0a0;">Commento:</label>
                            <textarea id="commento" name="commento" rows="4" required 
                                      th:text="${recensione.commento}"
                                      style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 1rem; resize: vertical;"></textarea>
                        </div>

                        <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                            <button type="submit" style="background: linear-gradient(135deg, #8e2de2, #4a00e0); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;">
                                Salva Recensione
                            </button>
                            
                            <!-- Tasto annulla: appare solo se si sta modificando una recensione già esistente -->
                            <button type="button" th:if="${recensione.voto != null}" 
                                    onclick="document.getElementById('form-recensione').style.display = 'none'; document.getElementById('recensione-testo').style.display = 'block';"
                                    style="background: transparent; color: #a0a0a0; border: 1px solid rgba(255,255,255,0.2); padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer;">
                                Annulla
                            </button>
                        </div>
                    </form>
                </div>
                <!-- FINE SEZIONE RECENSIONE -->

            </div>
        </div>

    </div>

</body>

</html>
