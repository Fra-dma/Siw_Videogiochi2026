<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accedi - Game Vault</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--nav-bg); margin: 0;">

    <div class="card" style="width: 100%; max-width: 420px; padding: 30px; border: 1px solid #ccc; border-radius: 8px; background-color: #fff;">

        <h1 style="font-size: 1.8rem; text-align: center; margin-bottom: 5px;">Accedi a Game Vault</h1>
        <p class="text-light" style="text-align: center; margin-bottom: 24px; color: #666;">La tua libreria personale</p>

        <!-- Mostriamo solo l'errore in caso di credenziali errate -->
        <div th:if="${param.error}" style="color: #dc3545; text-align: center; margin-bottom: 15px; font-weight: bold;">
            Username o password non validi.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">Username</label>
                <input type="text" name="username" class="form-control" style="width: 100%; padding: 10px; box-sizing: border-box;" required />
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 5px;">Password</label>
                <input type="password" name="password" class="form-control" style="width: 100%; padding: 10px; box-sizing: border-box;" required />
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;">
                Entra
            </button>
        </form>

    </div>

</body>
</html>
