<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accedi - Game Vault</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">

            <h1 class="login-title">Accedi a Game Vault</h1>
            <p class="login-subtitle">La tua libreria personale</p>

            <div th:if="${param.error}" class="error-msg">
                Username o password non validi.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required autocomplete="off" />
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required />
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    Entra
                </button>
            </form>

            <hr class="divider">

            <p class="login-subtitle-small">
                Oppure accedi con un tuo account:
            </p>
            
            <a th:href="@{/oauth2/authorization/google}" class="btn btn-google btn-full">
                Accedi con Google
            </a>

        </div>
    </div>

</body>
</html>
