<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${gioco != null ? gioco.name : 'Dettagli Gioco'}">Dettagli Gioco</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">🎮 SiwVideogiochi</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/rawg/popolari" style="color: var(--primary);">Giochi Popolari (RAWG)</a>
            <a th:href="@{/libreria}">Libreria Personale</a>
        </div>
    </nav>

    <div class="container" th:if="${gioco != null}">
        <div class="detail-hero">
            <img th:src="${gioco.background_image != null ? gioco.background_image : 'https://via.placeholder.com/1200x600?text=No+Image'}" 
                 alt="Background del gioco" 
                 class="detail-bg">
            <div class="detail-overlay">
                <div class="detail-info">
                    <h1 class="detail-title" th:text="${gioco.name}">Nome Gioco</h1>
                    <div class="detail-meta">
                        <div>
                            <strong>Data Rilascio:</strong> <span th:text="${gioco.released != null ? gioco.released : 'Sconosciuta'}">N/A</span>
                        </div>
                        <div>
                            <strong>Valutazione RAWG:</strong> 
                            <span class="rating-badge" style="display:inline-flex; font-size:1rem;">
                                ★ <span th:text="${gioco.rating != null ? gioco.rating : 'N/A'}">4.5</span>
                            </span>
                        </div>
                    </div>
                    
					<!-- Contenitore Bottoni -->
				    <div style="margin-top: 2rem; display: flex; gap: 2rem;">
					                        
				    <!-- Bottone Sinistro -->
				    <a href="/rawg/popolari" class="btn" style="flex: 1; text-align: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white;">
					   Torna ai Popolari
					</a>
					                        
					<!-- Bottone Destro (Mostrato se NON in libreria) -->
					<!-- Aggiunto display: flex per far stirare il bottone interno -->
					<form th:unless="${isInLibreria}" th:action="@{/libreria/aggiungiDaRawg}" method="post" style="flex: 1; margin: 0; display: flex;">
					<input type="hidden" name="rawgId" th:value="${gioco.id}" />
					<input type="hidden" name="idUtente" value="1" />
				    <button type="submit" class="btn btn-primary" style="flex: 1; text-align: center;">
					➕ Aggiungi
					</button>
					</form>
					                        
					<!-- Bottone Destro (Mostrato se GIÀ in libreria) -->
					<button th:if="${isInLibreria}" class="btn btn-primary" style="flex: 1; text-align: center; opacity: 0.8; cursor: default;" disabled>
					✔ Gioco Aggiunto
					</button>
					                        
					</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container" th:if="${gioco == null}">
        <div class="page-header">
            <h1 class="page-title">Gioco non trovato</h1>
            <p style="color: var(--text-muted);">Impossibile recuperare i dettagli per questo gioco. L'API RAWG potrebbe non aver restituito risultati.</p>
            <a href="/rawg/popolari" class="btn btn-primary" style="margin-top: 2rem;">Torna indietro</a>
        </div>
    </div>

</body>
</html>
